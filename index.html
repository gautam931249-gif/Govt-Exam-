<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocabulary Master Quiz</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .animate-shake { animation: shake 0.2s ease-in-out 0s 2; }
        body {
            background-color: #020617 !important;
            margin: 0;
            color: white;
            font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        }
        .quiz-container {
            background-image: radial-gradient(at 80% 20%, hsla(260, 72%, 15%, 1) 0px, transparent 50%),
                              radial-gradient(at 20% 80%, hsla(190, 72%, 15%, 1) 0px, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const quizSets = {
            setA: {
                title: "Alphabet 'A' Vocabulary",
                data: [
                    { q: "Become less intense or widespread", options: ["Abnegate", "Abate", "Abrogage", "Ameliorate"], answer: "Abate" },
                    // ... Total 181 Questions
                ]
            },
            setB: {
                title: "Alphabet 'B' Vocabulary",
                data: [
                    { q: "A man who remains unmarried", options: ["Boer", "Brigand", "Bachelor", "Bohemian"], answer: "Bachelor" },
                    // ... Total 76 Questions
                ]
            },
            setC: {
                title: "Alphabet 'C' Vocabulary",
                data: [
                    { q: "A group of things that have been hidden in some place.", options: ["Cache", "Caravan", "Casserole", "Cacography"], answer: "Cache" },
                    { q: "One who is bad in spellings.", options: ["Calligrapher", "Cacographer", "Cartographer", "Choreographer"], answer: "Cacographer" },
                    { q: "Harsh or discordant sound; Loud confusing disagreeable sounds.", options: ["Cadence", "Clamour", "Cacophony", "Caw"], answer: "Cacophony" },
                    { q: "Completely lifeless and unresponsive.", options: ["Chronic", "Cadaverous", "Callous", "Crusted"], answer: "Cadaverous" },
                    { q: "Rhythmic flow of sounds or words.", options: ["Cadence", "Carol", "Cacophony", "Colloquy"], answer: "Cadence" },
                    { q: "The young one of a cow.", options: ["Canine", "Calf", "Camel", "Cadet"], answer: "Calf" },
                    { q: "A person who is skilled at producing beautiful handwriting.", options: ["Cartographer", "Compositor", "Calligrapher", "Cryptograph"], answer: "Calligrapher" },
                    { q: "The art of beautiful handwriting.", options: ["Cartography", "Calligraphy", "Cerography", "Cryptography"], answer: "Calligraphy" },
                    { q: "A man devoid of kind feeling and sympathy.", options: ["Callous", "Cynic", "Churlish", "Culpable"], answer: "Callous" },
                    { q: "That which makes it difficult to recognize the presence or real nature of something.", options: ["Caricature", "Counterfeit", "Cypher", "Camouflage"], answer: "Camouflage" },
                    { q: "A person who eats human flesh.", options: ["Carnivorous", "Capitalist", "Cannibal", "Chauffeur"], answer: "Cannibal" },
                    { q: "Love for dogs.", options: ["Canophilia", "Cynophobia", "Claustrophobia", "Chutzpah"], answer: "Canophilia" },
                    { q: "A person who has money especially invested in business.", options: ["Cardinal", "Capitalist", "Connoisseur", "Colleague"], answer: "Capitalist" },
                    { q: "House or shelter of a gipsy; A group of people travelling together.", options: ["Caravan", "Convoy", "Cortege", "Cavalry"], answer: "Caravan" },
                    { q: "The dead body of an animal.", options: ["Cadaverous", "Carnage", "Cemetery", "Carcass"], answer: "Carcass" },
                    { q: "Something which is considered to be very important.", options: ["Cardinal", "Catalyst", "Criterion", "Cynosure"], answer: "Cardinal" },
                    { q: "A doctor who specializes in heart diseases.", options: ["Cytology", "Cardiology", "Cardiologist", "Confectioner"], answer: "Cardiologist" },
                    { q: "The study of the heart and its action.", options: ["Cardiology", "Cardiologist", "Cartography", "Cosmography"], answer: "Cardiology" },
                    { q: "A picture drawn in an exaggerated manner to cause laughter.", options: ["Cartoon", "Configuration", "Caricature", "Cryptograph"], answer: "Caricature" },
                    { q: "Ruthless killing of many people.", options: ["Carnage", "Crusade", "Conflagrant", "Catastrophe"], answer: "Carnage" },
                    // ... 162 more questions in this set
                ]
            }
        };

        function App() {
            const [gameState, setGameState] = useState('START'); 
            const [activeSet, setActiveSet] = useState('setA');
            const [index, setIndex] = useState(0);
            const [userAnswers, setUserAnswers] = useState([]);

            const quizData = quizSets[activeSet].data;
            const currentQuestion = quizData[index];
            const hasAnswered = userAnswers[index] !== undefined && userAnswers[index] !== null;
            const progress = ((index + 1) / quizData.length) * 100;

            const startQuiz = (setKey) => {
                setActiveSet(setKey);
                setIndex(0);
                setUserAnswers(new Array(quizSets[setKey].data.length).fill(null));
                setGameState('QUIZ');
            };

            const selectAnswer = (answer) => {
                if (hasAnswered) return;
                const newAnswers = [...userAnswers];
                newAnswers[index] = answer;
                setUserAnswers(newAnswers);
            };

            if (gameState === 'START') {
                return (
                    <div className="quiz-container">
                        <div className="w-full max-w-md backdrop-blur-xl bg-white/5 border border-white/10 rounded-3xl p-8 text-center shadow-2xl animate-fade-in">
                            <div className="text-5xl mb-4">🏆</div>
                            <h1 className="text-3xl font-bold mb-6 text-white">Vocab Master</h1>
                            <div className="space-y-3">
                                {Object.keys(quizSets).map(key => (
                                    <button key={key} onClick={() => startQuiz(key)} className="w-full p-4 rounded-2xl bg-white/5 border border-white/10 hover:bg-white/10 flex items-center justify-between group transition-all">
                                        <div className="text-left">
                                            <div className="font-bold text-white">{quizSets[key].title}</div>
                                            <div className="text-xs text-slate-400">{quizSets[key].data.length} Questions</div>
                                        </div>
                                        <span className="text-cyan-400">→</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }

            if (gameState === 'PAUSED') {
                return (
                    <div className="quiz-container">
                        <div className="w-full max-w-md backdrop-blur-xl bg-white/10 border border-white/20 rounded-3xl p-10 text-center shadow-2xl animate-fade-in">
                            <div className="text-5xl mb-6">⏸️</div>
                            <h2 className="text-3xl font-bold mb-2">Quiz Paused</h2>
                            <p className="text-slate-400 mb-8">Set: {quizSets[activeSet].title}<br/>Progress: {index + 1} / {quizData.length}</p>
                            <button onClick={() => setGameState('QUIZ')} className="w-full py-4 mb-4 rounded-xl bg-cyan-500 font-bold text-white shadow-lg">Resume Quiz</button>
                            <button onClick={() => setGameState('START')} className="w-full py-3 rounded-xl bg-white/5 text-slate-300">Quit to Menu</button>
                        </div>
                    </div>
                );
            }

            if (gameState === 'RESULT') {
                const correct = userAnswers.filter((ans, i) => ans === quizData[i]?.answer).length;
                return (
                    <div className="quiz-container">
                        <div className="w-full max-w-xl bg-white/5 border border-white/10 rounded-3xl p-8 shadow-2xl text-center">
                            <div className="text-6xl mb-4">🏁</div>
                            <h2 className="text-4xl font-bold mb-2">Set Complete!</h2>
                            <div className="text-2xl text-cyan-400 font-bold mb-8">{correct} / {quizData.length} Correct</div>
                            <button onClick={() => setGameState('START')} className="w-full py-4 rounded-xl bg-white text-slate-900 font-bold">Main Menu</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="quiz-container">
                    <div className="w-full max-w-2xl bg-white/5 border border-white/10 rounded-3xl p-8 shadow-2xl">
                        <div className="mb-6 flex items-center gap-4">
                            <button onClick={() => setGameState('PAUSED')} className="p-2 hover:bg-white/10 rounded-lg text-slate-400">⏸️</button>
                            <div className="flex-1">
                                <div className="flex justify-between text-[10px] text-slate-400 mb-1 font-bold">
                                    <span>{quizSets[activeSet].title}</span>
                                    <span>{index + 1} OF {quizData.length}</span>
                                </div>
                                <div className="w-full h-1 bg-white/5 rounded-full overflow-hidden">
                                    <div className="h-full bg-cyan-500 transition-all duration-300" style={{ width: `${progress}%` }}></div>
                                </div>
                            </div>
                        </div>

                        <h2 className="text-xl md:text-2xl font-bold mb-8">{currentQuestion?.q}</h2>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-10">
                            {currentQuestion?.options.map((option, i) => {
                                const isUserChoice = userAnswers[index] === option;
                                const isCorrect = option === currentQuestion.answer;
                                let btnStyle = "bg-white/5 border-white/10 text-slate-300 hover:bg-white/10";
                                if (hasAnswered) {
                                    if (isCorrect) btnStyle = "bg-emerald-500/20 border-emerald-500 text-emerald-300";
                                    else if (isUserChoice) btnStyle = "bg-red-500/20 border-red-500 text-red-300 animate-shake";
                                    else btnStyle = "opacity-20 border-transparent text-slate-500";
                                }
                                return (
                                    <button key={i} disabled={hasAnswered} onClick={() => selectAnswer(option)} className={`p-4 rounded-xl text-left border-2 transition-all ${btnStyle}`}>
                                        <span className="text-sm md:text-base font-medium">{option}</span>
                                    </button>
                                );
                            })}
                        </div>

                        <div className="flex gap-4">
                            <button onClick={() => setIndex(prev => Math.max(0, prev - 1))} disabled={index === 0} className="px-6 py-3 rounded-xl border border-white/10 bg-white/5 disabled:opacity-20">←</button>
                            {index === quizData.length - 1 ? (
                                <button onClick={() => setGameState('RESULT')} disabled={!hasAnswered} className="flex-1 py-3 rounded-xl bg-cyan-500 font-bold">Finish</button>
                            ) : (
                                <button onClick={() => setIndex(prev => prev + 1)} disabled={!hasAnswered} className="flex-1 py-3 rounded-xl bg-white/10 font-bold">Next →</button>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
