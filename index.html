<!DOCTYPE html>
<html>
<head>
<title>One Word Substitution Quiz</title>

<style>

body{
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#74ebd5,#ACB6E5);
height:100vh;
}

.quiz-box{
background:white;
width:420px;
margin:60px auto;
padding:25px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
animation:fadeIn 0.8s ease;
}

button{
margin:8px;
padding:12px;
width:260px;
cursor:pointer;
border:none;
border-radius:6px;
background:#e0e0e0;
transition:all 0.25s ease;
}

button:hover{
background:#4CAF50;
color:white;
transform:scale(1.05);
}

.nav-btn{
width:120px;
background:#2196F3;
color:white;
}

.nav-btn:hover{
background:#0b7dda;
}

.correct{
background:#4CAF50 !important;
color:white;
animation:pulse 0.4s;
}

.wrong{
background:#f44336 !important;
color:white;
animation:shake 0.4s;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.1)}
100%{transform:scale(1)}
}

@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-5px)}
50%{transform:translateX(5px)}
75%{transform:translateX(-5px)}
100%{transform:translateX(0)}
}

</style>
</head>

<body>

<div class="quiz-box">

<h2>One Word Substitution Quiz</h2>

<h3 id="question"></h3>

<div id="options"></div>

<br>

<button class="nav-btn" onclick="prevQuestion()">⬅ Previous</button>
<button class="nav-btn" onclick="nextQuestion()">Next ➡</button>

<br><br>

<button onclick="finishQuiz()">Finish Quiz</button>

</div>

<script>

const quiz=[
{
q:"A person who loves books",
options:["Philanthropist","Bibliophile","Optimist","Linguist"],
answer:"Bibliophile"
},
{
q:"A person who hates mankind",
options:["Misanthropist","Philanthropist","Optimist","Realist"],
answer:"Misanthropist"
},
{
q:"A person who travels from place to place",
options:["Nomad","Citizen","Native","Farmer"],
answer:"Nomad"
},
{
q:"A person who writes dictionaries",
options:["Lexicographer","Biographer","Editor","Poet"],
answer:"Lexicographer"
}
];

let index=0;
let userAnswers=[];

function loadQuestion(){

let q=quiz[index];

document.getElementById("question").innerText=(index+1)+". "+q.q;

let html="";

q.options.forEach(opt=>{

html+=`<button onclick="selectAnswer(this,'${opt}')">${opt}</button><br>`;

});

document.getElementById("options").innerHTML=html;

}

function selectAnswer(btn,ans){

userAnswers[index]=ans;

if(ans===quiz[index].answer){
btn.classList.add("correct");
}else{
btn.classList.add("wrong");
}

}

function nextQuestion(){
if(index<quiz.length-1){
index++;
loadQuestion();
}
}

function prevQuestion(){
if(index>0){
index--;
loadQuestion();
}
}

function finishQuiz(){

let correct=0;
let wrong=0;

quiz.forEach((q,i)=>{
if(userAnswers[i]===q.answer){
correct++;
}else{
wrong++;
}
});

document.querySelector(".quiz-box").innerHTML=`

<h2>🎉 Quiz Finished</h2>

<p>Total Questions: ${quiz.length}</p>

<p style="color:green;font-size:18px;">Correct: ${correct}</p>

<p style="color:red;font-size:18px;">Wrong: ${wrong}</p>

<h3>Your Score: ${correct}/${quiz.length}</h3>

`;

}

loadQuestion();

</script>

</body>
</html>
