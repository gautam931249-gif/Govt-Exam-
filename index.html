<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Word Substitution Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        .animate-shake { animation: shake 0.2s ease-in-out 0s 2; }
        .bg-mesh {
            background-color: #020617;
            background-image: radial-gradient(at 80% 20%, hsla(260, 72%, 20%, 1) 0px, transparent 50%),
                              radial-gradient(at 20% 80%, hsla(190, 72%, 20%, 1) 0px, transparent 50%);
        }
    </style>
</head>
<body class="bg-mesh min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, className }) => {
            useEffect(() => { lucide.createIcons(); }, []);
            return <i data-lucide={name} className={className}></i>;
        };

        const quizData = [
            { q: "A person who loves books", options: ["Philanthropist", "Bibliophile", "Optimist", "Linguist"], answer: "Bibliophile" },
            { q: "A person who hates mankind", options: ["Misanthropist", "Philanthropist", "Optimist", "Realist"], answer: "Misanthropist" },
            { q: "A person who travels from place to place", options: ["Nomad", "Citizen", "Native", "Farmer"], answer: "Nomad" },
            { q: "A person who writes dictionaries", options: ["Lexicographer", "Biographer", "Editor", "Poet"], answer: "Lexicographer" }
        ];

        function App() {
            const [isStarted, setIsStarted] = useState(false);
            const [index, setIndex] = useState(0);
            const [userAnswers, setUserAnswers] = useState(new Array(quizData.length).fill(null));
            const [showResults, setShowResults] = useState(false);

            const currentQuestion = quizData[index];
            const hasAnswered = userAnswers[index] !== null;
            const progress = ((index + 1) / quizData.length) * 100;

            const selectAnswer = (answer) => {
                if (hasAnswered) return;
                const newAnswers = [...userAnswers];
                newAnswers[index] = answer;
                setUserAnswers(newAnswers);
            };

            const calculateResults = () => {
                let correct = 0;
                userAnswers.forEach((ans, i) => { if (ans === quizData[i].answer) correct++; });
                return { correct, wrong: quizData.length - correct };
            };

            // --- TAB 1: START SCREEN ---
            if (!isStarted) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 text-white">
                        <div className="w-full max-w-md backdrop-blur-xl bg-white/10 border border-white/20 rounded-3xl p-10 text-center shadow-2xl animate-fade-in">
                            <div className="mb-6 flex justify-center">
                                <div className="p-4 bg-gradient-to-br from-cyan-500 to-purple-600 rounded-2xl shadow-lg">
                                    <Icon name="brain-circuit" className="w-12 h-12 text-white" />
                                </div>
                            </div>
                            <h1 className="text-3xl font-extrabold mb-2 tracking-tight">Vocabulary Master</h1>
                            <p className="text-slate-400 mb-8">Test your knowledge of One Word Substitutions</p>
                            
                            <div className="text-left bg-black/20 rounded-xl p-4 mb-8 text-sm text-slate-300 space-y-2">
                                <div className="flex items-center gap-2"><Icon name="check" className="w-4 h-4 text-cyan-400"/> {quizData.length} Questions</div>
                                <div className="flex items-center gap-2"><Icon name="lock" className="w-4 h-4 text-cyan-400"/> No changing answers</div>
                                <div className="flex items-center gap-2"><Icon name="award" className="w-4 h-4 text-cyan-400"/> Instant feedback</div>
                            </div>

                            <button 
                                onClick={() => setIsStarted(true)}
                                className="w-full py-4 rounded-xl bg-gradient-to-r from-cyan-500 to-blue-600 font-bold text-lg hover:shadow-cyan-500/25 hover:shadow-2xl transition-all active:scale-95"
                            >
                                Start Quiz
                            </button>
                        </div>
                    </div>
                );
            }

            // --- TAB 2: RESULTS SCREEN ---
            if (showResults) {
                const { correct, wrong } = calculateResults();
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 text-white">
                        <div className="w-full max-w-2xl bg-white/10 border border-white/20 rounded-3xl p-8 shadow-2xl animate-fade-in text-center">
                            <Icon name="trophy" className="w-16 h-16 text-yellow-400 mx-auto mb-4" />
                            <h2 className="text-4xl font-bold mb-6">Quiz Completed!</h2>
                            <div className="grid grid-cols-2 gap-4 mb-8">
                                <div className="p-6 bg-emerald-500/20 border border-emerald-500/40 rounded-2xl">
                                    <div className="text-3xl font-bold text-emerald-400">{correct}</div>
                                    <div className="text-sm text-slate-300">Correct</div>
                                </div>
                                <div className="p-6 bg-red-500/20 border border-red-500/40 rounded-2xl">
                                    <div className="text-3xl font-bold text-red-400">{wrong}</div>
                                    <div className="text-sm text-slate-300">Wrong</div>
                                </div>
                            </div>
                            <button onClick={() => window.location.reload()} className="w-full py-4 rounded-xl bg-white text-slate-900 font-bold hover:bg-slate-200 transition-colors">
                                Play Again
                            </button>
                        </div>
                    </div>
                );
            }

            // --- TAB 3: QUIZ SCREEN ---
            return (
                <div className="min-h-screen flex items-center justify-center p-4 text-white">
                    <div className="w-full max-w-2xl bg-white/10 border border-white/20 rounded-3xl p-8 shadow-2xl animate-fade-in">
                        <div className="mb-6">
                            <div className="flex justify-between text-xs font-medium text-slate-400 mb-2">
                                <span>QUESTION {index + 1} OF {quizData.length}</span>
                                <span>{Math.round(progress)}%</span>
                            </div>
                            <div className="w-full h-1.5 bg-white/10 rounded-full">
                                <div className="h-full bg-cyan-400 transition-all duration-500" style={{ width: `${progress}%` }}></div>
                            </div>
                        </div>

                        <h2 className="text-2xl font-bold mb-8 leading-tight">{currentQuestion.q}</h2>

                        <div className="space-y-3 mb-10">
                            {currentQuestion.options.map((option, i) => {
                                const isUserChoice = userAnswers[index] === option;
                                const isCorrect = option === currentQuestion.answer;
                                
                                let btnStyle = "bg-white/5 border-white/10 text-slate-300 hover:bg-white/10";
                                if (hasAnswered) {
                                    if (isCorrect) btnStyle = "bg-emerald-500/20 border-emerald-500 text-emerald-300 shadow-[0_0_15px_rgba(16,185,129,0.2)]";
                                    else if (isUserChoice) btnStyle = "bg-red-500/20 border-red-500 text-red-300 animate-shake";
                                    else btnStyle = "bg-white/5 border-transparent opacity-30 text-slate-500";
                                }

                                return (
                                    <button
                                        key={i}
                                        disabled={hasAnswered}
                                        onClick={() => selectAnswer(option)}
                                        className={`w-full p-4 rounded-xl text-left transition-all border-2 flex justify-between items-center font-medium ${btnStyle}`}
                                    >
                                        {option}
                                        {hasAnswered && isCorrect && <Icon name="check-circle" className="w-5 h-5 text-emerald-400" />}
                                        {hasAnswered && isUserChoice && !isCorrect && <Icon name="x-circle" className="w-5 h-5 text-red-400" />}
                                    </button>
                                );
                            })}
                        </div>

                        <div className="flex gap-4">
                            <button 
                                onClick={() => setIndex(prev => Math.max(0, prev - 1))} 
                                disabled={index === 0} 
                                className="flex-1 py-3 rounded-xl border border-white/10 bg-white/5 disabled:opacity-20 hover:bg-white/10 transition-all"
                            >
                                Back
                            </button>
                            {index === quizData.length - 1 ? (
                                <button 
                                    onClick={() => setShowResults(true)} 
                                    disabled={!hasAnswered}
                                    className="flex-1 py-3 rounded-xl bg-gradient-to-r from-cyan-500 to-blue-600 font-bold disabled:opacity-50"
                                >
                                    Finish Quiz
                                </button>
                            ) : (
                                <button 
                                    onClick={() => setIndex(prev => prev + 1)} 
                                    disabled={!hasAnswered}
                                    className="flex-1 py-3 rounded-xl bg-white/10 font-bold hover:bg-white/20 transition-all disabled:opacity-50"
                                >
                                    Next
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
