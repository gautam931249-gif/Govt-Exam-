<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Word Substitution Quiz - Locked Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        .animate-shake { animation: shake 0.2s ease-in-out 0s 2; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, className }) => {
            useEffect(() => { lucide.createIcons(); }, []);
            return <i data-lucide={name} className={className}></i>;
        };

        const quizData = [
            { q: "A person who loves books", options: ["Philanthropist", "Bibliophile", "Optimist", "Linguist"], answer: "Bibliophile" },
            { q: "A person who hates mankind", options: ["Misanthropist", "Philanthropist", "Optimist", "Realist"], answer: "Misanthropist" },
            { q: "A person who travels from place to place", options: ["Nomad", "Citizen", "Native", "Farmer"], answer: "Nomad" },
            { q: "A person who writes dictionaries", options: ["Lexicographer", "Biographer", "Editor", "Poet"], answer: "Lexicographer" }
        ];

        function App() {
            const [index, setIndex] = useState(0);
            const [userAnswers, setUserAnswers] = useState(new Array(quizData.length).fill(null));
            const [showResults, setShowResults] = useState(false);

            const currentQuestion = quizData[index];
            const hasAnswered = userAnswers[index] !== null;
            const progress = ((index + 1) / quizData.length) * 100;

            const selectAnswer = (answer) => {
                // If user has already answered this question, don't allow changes
                if (hasAnswered) return;

                const newAnswers = [...userAnswers];
                newAnswers[index] = answer;
                setUserAnswers(newAnswers);
            };

            const nextQuestion = () => {
                if (index < quizData.length - 1) setIndex(index + 1);
            };

            const prevQuestion = () => {
                if (index > 0) setIndex(index - 1);
            };

            const calculateResults = () => {
                let correct = 0;
                quizData.forEach((q, i) => { if (userAnswers[i] === q.answer) correct++; });
                const answeredCount = userAnswers.filter(a => a !== null).length;
                return { correct, wrong: answeredCount - correct, total: quizData.length };
            };

            if (showResults) {
                const { correct, wrong, total } = calculateResults();
                const percentage = Math.round((correct / total) * 100);

                return (
                    <div className="min-h-screen bg-slate-950 flex items-center justify-center p-4 text-white">
                        <div className="w-full max-w-2xl bg-white/5 border border-white/10 rounded-3xl p-8 shadow-2xl animate-fade-in">
                            <h2 className="text-4xl font-bold text-center mb-6 bg-gradient-to-r from-cyan-400 to-purple-400 bg-clip-text text-transparent">Final Score</h2>
                            <div className="grid grid-cols-2 gap-4 mb-8">
                                <div className="p-6 bg-emerald-500/10 border border-emerald-500/20 rounded-2xl text-center">
                                    <div className="text-3xl font-bold text-emerald-400">{correct}</div>
                                    <div className="text-sm text-slate-400">Correct</div>
                                </div>
                                <div className="p-6 bg-red-500/10 border border-red-500/20 rounded-2xl text-center">
                                    <div className="text-3xl font-bold text-red-400">{wrong}</div>
                                    <div className="text-sm text-slate-400">Wrong</div>
                                </div>
                            </div>
                            <button onClick={() => window.location.reload()} className="w-full py-4 rounded-xl bg-gradient-to-r from-cyan-500 to-purple-500 font-bold hover:scale-105 transition-transform">Try Again</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-950 flex items-center justify-center p-4 relative text-white">
                    <div className="w-full max-w-2xl bg-white/5 border border-white/10 rounded-3xl p-8 shadow-2xl relative z-10 animate-fade-in">
                        {/* Progress Bar */}
                        <div className="mb-6">
                            <div className="flex justify-between text-xs text-slate-400 mb-2">
                                <span>Question {index + 1} of {quizData.length}</span>
                                <span>{Math.round(progress)}%</span>
                            </div>
                            <div className="w-full h-1.5 bg-white/10 rounded-full">
                                <div className="h-full bg-cyan-500 transition-all duration-500" style={{ width: `${progress}%` }}></div>
                            </div>
                        </div>

                        <h2 className="text-2xl font-semibold mb-8">{currentQuestion.q}</h2>

                        <div className="space-y-3 mb-10">
                            {currentQuestion.options.map((option, i) => {
                                const isUserChoice = userAnswers[index] === option;
                                const isCorrect = option === currentQuestion.answer;
                                
                                // Logic for colors after answering
                                let buttonClass = "bg-white/5 border-white/10 text-slate-300 hover:bg-white/10";
                                if (hasAnswered) {
                                    if (isCorrect) {
                                        buttonClass = "bg-emerald-500/20 border-emerald-500 text-emerald-300";
                                    } else if (isUserChoice && !isCorrect) {
                                        buttonClass = "bg-red-500/20 border-red-500 text-red-300 animate-shake";
                                    } else {
                                        buttonClass = "bg-white/5 border-white/5 opacity-40 text-slate-500";
                                    }
                                }

                                return (
                                    <button
                                        key={i}
                                        disabled={hasAnswered}
                                        onClick={() => selectAnswer(option)}
                                        className={`w-full p-4 rounded-xl text-left transition-all border-2 flex justify-between items-center ${buttonClass} ${!hasAnswered && 'hover:scale-[1.01]'}`}
                                    >
                                        <span>{option}</span>
                                        {hasAnswered && isCorrect && <Icon name="check-circle" className="w-5 h-5 text-emerald-400" />}
                                        {hasAnswered && isUserChoice && !isCorrect && <Icon name="x-circle" className="w-5 h-5 text-red-400" />}
                                    </button>
                                );
                            })}
                        </div>

                        <div className="flex gap-4">
                            <button onClick={prevQuestion} disabled={index === 0} className="flex-1 py-3 rounded-xl border border-white/10 bg-white/5 disabled:opacity-20 transition-opacity">Back</button>
                            {index === quizData.length - 1 ? (
                                <button onClick={() => setShowResults(true)} className="flex-1 py-3 rounded-xl bg-gradient-to-r from-cyan-500 to-purple-500 font-bold">Finish</button>
                            ) : (
                                <button onClick={nextQuestion} className="flex-1 py-3 rounded-xl bg-white/10 font-bold hover:bg-white/20 transition-all">Next</button>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
