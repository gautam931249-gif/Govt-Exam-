<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Word Substitution Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#f5f5f5] text-[#1a1a1a] font-sans antialiased selection:bg-emerald-100">

    <!-- Mobile Header -->
    <header class="lg:hidden bg-white border-b border-black/5 p-4 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <i data-lucide="book-open" class="w-6 h-6 text-emerald-600"></i>
            <h1 class="font-bold text-lg tracking-tight">Substitution Quiz</h1>
        </div>
        <button id="mobileMenuBtn" class="p-2 hover:bg-black/5 rounded-lg transition-colors">
            <i data-lucide="menu" id="menuIcon"></i>
        </button>
    </header>

    <div class="flex max-w-7xl mx-auto min-h-[calc(100vh-64px)] lg:min-h-screen">
        <!-- Sidebar Navigation -->
        <aside id="sidebar" class="fixed lg:sticky top-0 left-0 h-full lg:h-screen w-72 bg-white border-r border-black/5 z-40 transition-transform duration-300 ease-in-out -translate-x-full lg:translate-x-0">
            <div class="p-8">
                <div class="hidden lg:flex items-center gap-3 mb-12">
                    <div class="w-10 h-10 bg-emerald-600 rounded-xl flex items-center justify-center text-white">
                        <i data-lucide="book-open" class="w-6 h-6"></i>
                    </div>
                    <h1 class="font-bold text-xl tracking-tight">Substitution Quiz</h1>
                </div>

                <nav class="space-y-1" id="quizTabs">
                    <p class="text-[11px] uppercase tracking-widest font-semibold text-black/40 mb-4 px-3">Quiz Sets</p>
                    <!-- Tabs will be injected here by JS -->
                </nav>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1 p-4 lg:p-12 overflow-y-auto">
            <div id="quizContainer" class="max-w-3xl mx-auto">
                <!-- Progress Header -->
                <div class="mb-8">
                    <div class="flex items-center justify-between mb-4">
                        <span class="text-sm font-medium text-black/40" id="progressText">Question 1 of 50</span>
                        <span class="text-sm font-bold text-emerald-600" id="progressPercent">0%</span>
                    </div>
                    <div class="h-2 w-full bg-black/5 rounded-full overflow-hidden">
                        <div id="progressBar" class="h-full bg-emerald-500 transition-all duration-300" style="width: 0%"></div>
                    </div>
                </div>

                <!-- Question Card -->
                <div id="questionCard" class="bg-white rounded-3xl p-8 lg:p-12 shadow-sm border border-black/5 mb-8 fade-in">
                    <h2 id="questionText" class="text-2xl lg:text-3xl font-semibold leading-tight mb-12">
                        Loading question...
                    </h2>
                    <div class="grid gap-4" id="optionsGrid">
                        <!-- Options injected here -->
                    </div>
                </div>

                <!-- Navigation Controls -->
                <div class="flex items-center justify-between gap-4">
                    <button id="prevBtn" class="flex items-center gap-2 px-6 py-3 rounded-xl font-medium text-black/60 hover:bg-black/5 disabled:opacity-30 transition-all">
                        <i data-lucide="chevron-left" class="w-5 h-5"></i>
                        Previous
                    </button>

                    <button id="nextBtn" class="flex items-center gap-2 px-8 py-3 bg-black text-white rounded-xl font-bold shadow-lg shadow-black/10 hover:bg-black/80 disabled:opacity-50 transition-all">
                        <span>Next</span>
                        <i data-lucide="chevron-right" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>

            <!-- Results Section (Hidden by default) -->
            <div id="resultsContainer" class="max-w-4xl mx-auto hidden">
                <div class="bg-white rounded-[40px] p-8 lg:p-16 shadow-xl shadow-black/5 border border-black/5 mb-12 text-center relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-2 bg-emerald-500"></div>
                    <div class="w-24 h-24 bg-emerald-50 rounded-full flex items-center justify-center mx-auto mb-8">
                        <i data-lucide="trophy" class="w-12 h-12 text-emerald-600"></i>
                    </div>
                    <h2 class="text-4xl font-bold mb-2 tracking-tight">Quiz Complete!</h2>
                    <p class="text-black/40 font-medium mb-12" id="resultSubtitle">Here's how you performed</p>

                    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-12">
                        <div class="p-6 bg-black/5 rounded-3xl">
                            <p class="text-[10px] uppercase tracking-widest font-bold text-black/40 mb-1">Total</p>
                            <p class="text-3xl font-bold" id="resTotal">50</p>
                        </div>
                        <div class="p-6 bg-emerald-50 rounded-3xl">
                            <p class="text-[10px] uppercase tracking-widest font-bold text-emerald-600/60 mb-1">Correct</p>
                            <p class="text-3xl font-bold text-emerald-700" id="resCorrect">0</p>
                        </div>
                        <div class="p-6 bg-rose-50 rounded-3xl">
                            <p class="text-[10px] uppercase tracking-widest font-bold text-rose-600/60 mb-1">Wrong</p>
                            <p class="text-3xl font-bold text-rose-700" id="resWrong">0</p>
                        </div>
                        <div class="p-6 bg-emerald-600 rounded-3xl text-white">
                            <p class="text-[10px] uppercase tracking-widest font-bold text-white/60 mb-1">Score</p>
                            <p class="text-3xl font-bold" id="resPercent">0%</p>
                        </div>
                    </div>

                    <button id="restartBtn" class="inline-flex items-center gap-2 px-10 py-4 bg-black text-white rounded-2xl font-bold hover:bg-black/80 transition-all shadow-lg shadow-black/20">
                        <i data-lucide="rotate-ccw" class="w-5 h-5"></i>
                        Restart Quiz
                    </button>
                </div>

                <div class="space-y-6">
                    <h3 class="text-xl font-bold px-4">Review Answers</h3>
                    <div id="reviewList" class="space-y-6">
                        <!-- Review items injected here -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Mobile Overlay -->
    <div id="overlay" class="fixed inset-0 bg-black/20 backdrop-blur-sm z-30 hidden lg:hidden"></div>

    <script src="script.js"></script>
</body>
</html>
