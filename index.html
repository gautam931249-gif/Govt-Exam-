                            <div className="space-y-3 text-left">
                                {Object.keys(quizData).map(key => (
                                    <button key={key} onClick={() => startQuiz(key)} className="w-full p-5 rounded-3xl bg-white/5 border border-white/10 hover:bg-indigo-500/20 hover:border-indigo-500/40 transition-all flex justify-between items-center group">
                                        <div>
                                            <div className="font-bold text-lg">{quizData[key].title}</div>
                                            <div className="text-xs text-slate-500 font-bold">{quizData[key].questions.length} Questions</div>
                                        </div>
                                        <span className="text-indigo-400 group-hover:translate-x-1 transition-transform">→</span>
                                    </button>
                                ))}
                            </div>
                            <div className="mt-10 pt-6 border-t border-white/5 text-[10px] text-slate-500 font-bold uppercase tracking-[0.2em]">
                                WARNING: ONCE YOU CLICK AN ANSWER, IT IS LOCKED!
                            </div>
                        </div>
                    </div>
                );
            }

            const currentSet = quizData[activeSet];
            const currentQ = currentSet.questions[index];
            const hasAnswered = answers[`${activeSet}-${index}`] !== undefined;

            return (
                <div className="quiz-bg flex items-center justify-center p-4">
                    <div className="w-full max-w-2xl bg-[#11111d]/95 border border-white/10 rounded-[40px] p-8 md:p-12 shadow-2xl animate-fade-in">
                        <div className="flex items-center gap-6 mb-12">
                            <button onClick={() => setGameState('MENU')} className="p-4 bg-white/5 hover:bg-white/10 rounded-2xl transition-all">🏠</button>
                            <div className="flex-1">
                                <div className="flex justify-between text-[10px] font-black text-slate-500 mb-2 uppercase tracking-widest">
                                    <span>{currentSet.title}</span>
                                    <span>{index + 1} / {currentSet.questions.length}</span>
                                </div>
                                <div className="h-2 bg-white/5 rounded-full overflow-hidden">
                                    <div className="h-full bg-gradient-to-r from-indigo-500 to-cyan-400 transition-all duration-700" style={{width: `${((index+1)/currentSet.questions.length)*100}%`}}></div>
                                </div>
                            </div>
                        </div>

                        <h2 className="text-2xl md:text-3xl font-bold mb-12 min-h-[100px] leading-snug">{currentQ.q}</h2>

                        <div className="space-y-4 mb-12">
                            {currentQ.options.map((opt, i) => {
                                const isCorrect = opt === currentQ.answer;
                                const isSelected = answers[`${activeSet}-${index}`] === opt;
                                let style = "bg-white/5 border-white/5 text-slate-300 hover:bg-white/10";
                                if (hasAnswered) {
                                    if (isCorrect) style = "bg-emerald-500/20 border-emerald-500 text-emerald-400";
                                    else if (isSelected) style = "bg-red-500/20 border-red-500 text-red-400 animate-shake";
                                    else style = "opacity-20 border-transparent grayscale text-slate-600";
                                }
                                return (
                                    <button key={i} disabled={hasAnswered} onClick={() => setAnswers({...answers, [`${activeSet}-${index}`]: opt})} 
                                            className={`w-full p-6 rounded-3xl border-2 text-left transition-all duration-300 text-lg font-bold ${style}`}>{opt}</button>
                                );
                            })}
                        </div>

                        <div className="flex gap-4">
                            <button onClick={() => setIndex(i => Math.max(0, i-1))} disabled={index === 0} className="px-8 py-5 bg-white/5 rounded-3xl hover:bg-white/10 transition-all font-bold">←</button>
                            <button onClick={() => index < currentSet.questions.length - 1 ? setIndex(i => i + 1) : setGameState('MENU')} 
                                    disabled={!hasAnswered} className="flex-1 py-5 bg-indigo-600 hover:bg-indigo-500 rounded-3xl font-black text-lg shadow-xl shadow-indigo-500/20 disabled:opacity-40 transition-all">
                                {index === currentSet.questions.length - 1 ? 'Finish Challenge' : 'Next Question →'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
