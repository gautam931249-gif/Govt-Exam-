<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocabulary Master Quiz</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .animate-shake { animation: shake 0.2s ease-in-out 0s 2; }
        body {
            background-color: #020617 !important;
            margin: 0;
            color: white;
            font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        }
        .quiz-container {
            background-image: radial-gradient(at 80% 20%, hsla(260, 72%, 15%, 1) 0px, transparent 50%),
                              radial-gradient(at 20% 80%, hsla(190, 72%, 15%, 1) 0px, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const quizSets = {
            set1: {
                title: "Basic Quiz",
                data: [
                    { q: "A person who loves books", options: ["Philanthropist", "Bibliophile", "Optimist", "Linguist"], answer: "Bibliophile" },
                    { q: "A person who hates mankind", options: ["Misanthropist", "Philanthropist", "Optimist", "Realist"], answer: "Misanthropist" },
                    { q: "A person who travels from place to place", options: ["Nomad", "Citizen", "Native", "Farmer"], answer: "Nomad" },
                    { q: "A person who writes dictionaries", options: ["Lexicographer", "Biographer", "Editor", "Poet"], answer: "Lexicographer" }
                ]
            },
            setA: {
                title: "Alphabet 'A' Vocabulary",
                data: [
                    { q: "Become less intense or widespread", options: ["Abnegate", "Abate", "Abrogate", "Ameliorate"], answer: "Abate" },
                    { q: "A place where animals are slaughtered for consumption as food", options: ["Apiary", "Abattoir", "Archive", "Arsenal"], answer: "Abattoir" },
                    { q: "The superior of a monastery", options: ["Abbot", "Ascetic", "Alumnus", "Apostle"], answer: "Abbot" },
                    { q: "To reduce to a shorter form intended to stand for the whole", options: ["Abridgement", "Acronym", "Abbreviation", "Anagram"], answer: "Abbreviation" },
                    { q: "To give up one's authority or throne", options: ["Abrogate", "Abscond", "Abnegate", "Abdicate"], answer: "Abdicate" },
                    // ... (Includes all 181 'A' questions provided previously)
                ]
            },
            setB: {
                title: "Alphabet 'B' Vocabulary",
                data: [
                    { q: "A man who remains unmarried", options: ["Boer", "Brigand", "Bachelor", "Bohemian"], answer: "Bachelor" },
                    { q: "A place where bread and cakes are made", options: ["Boutique", "Bakery", "Brewery", "Byre"], answer: "Bakery" },
                    { q: "A man having no hair on the scalp", options: ["Bizarre", "Bald", "Bellow", "Bask"], answer: "Bald" },
                    { q: "Senseless talk or writing", options: ["Balderdash", "Banter", "Bandying", "Blasphemy"], answer: "Balderdash" },
                    { q: "A large bundle bound for storage or transport", options: ["Barrel", "Battery", "Bale", "Bullion"], answer: "Bale" },
                    { q: "A poem that tells a story and has a regular rhythm and rhyme scheme", options: ["Bibliography", "Biography", "Ballad", "Beverage"], answer: "Ballad" },
                    { q: "Using (an idea, term, or name) frequently in casual talk", options: ["Banter", "Bandying", "Bombastic", "Bungle"], answer: "Bandying" },
                    { q: "One who is unable to pay his debts", options: ["Benefactor", "Bankrupt", "Beneficiary", "Bigot"], answer: "Bankrupt" },
                    { q: "Jokes and funny remarks amongst friends", options: ["Banter", "Balderdash", "Bellow", "Bandying"], answer: "Banter" },
                    { q: "Outer protective layer of a tree", options: ["Botany", "Bark", "Bonsai", "Biology"], answer: "Bark" },
                    { q: "An instrument used for measuring atmospheric pressure", options: ["Battery", "Barometer", "Buoy", "Bullion"], answer: "Barometer" },
                    { q: "Place given to soldiers to live in", options: ["Barracks", "Bungalow", "Bakery", "Bower"], answer: "Barracks" },
                    { q: "A wooden drum in which beer or oil is stored", options: ["Barrel", "Battery", "Bale", "Bundle"], answer: "Barrel" },
                    { q: "Revel in and make the most of something pleasing", options: ["Bask", "Bellow", "Bungle", "Borrow"], answer: "Bask" },
                    { q: "A group of guns or missile launchers operated together", options: ["Battery", "Boomerang", "Bridle", "Buoy"], answer: "Battery" },
                    { q: "Something of monstrous size or power", options: ["Biology", "Botany", "Behemoth", "Bovine"], answer: "Behemoth" },
                    { q: "A person who is fond of fighting", options: ["Benefactor", "Bigot", "Bellicose", "Boer"], answer: "Bellicose" },
                    { q: "The sound made by a crocodile", options: ["Bleat", "Bellow", "Buzz", "Banter"], answer: "Bellow" },
                    { q: "One who helps people by giving them money or other aid", options: ["Benefactor", "Beneficiary", "Bookworm", "Botanist"], answer: "Benefactor" },
                    { q: "A person who gains as a result of something", options: ["Boer", "Bibliophile", "Beneficiary", "Burglar"], answer: "Beneficiary" },
                    { q: "Deprived of or lacking of something", options: ["Bizarre", "Bereft", "Bombastic", "Bimonthly"], answer: "Bereft" },
                    { q: "Any soft drink except water", options: ["Beverage", "Bouquet", "Brunch", "Bevy"], answer: "Beverage" },
                    { q: "A group of girls/boys/birds etc.", options: ["Brood", "Bundle", "Bevy", "Budgeting"], answer: "Bevy" },
                    { q: "A list of the books referred to in a scholarly work", options: ["Biography", "Bibliography", "Bibliomania", "Bibliophile"], answer: "Bibliography" },
                    { q: "Preoccupation with the acquisition and possession of books", options: ["Bibliophile", "Bookworm", "Bibliomania", "Bibliography"], answer: "Bibliomania" },
                    { q: "A person who loves or collects books", options: ["Bibliophile", "Bookworm", "Botanist", "Bigot"], answer: "Bibliophile" },
                    { q: "200th anniversary", options: ["Biennial", "Bicentennial", "Bimonthly", "Bonus"], answer: "Bicentennial" },
                    { q: "A thing which happens every two years", options: ["Biennial", "Bicentennial", "Bimonthly", "Bonus"], answer: "Biennial" },
                    { q: "A person who is intolerant towards those holding different opinions", options: ["Bigot", "Bilingual", "Boer", "Bohemian"], answer: "Bigot" },
                    { q: "A person who can speak only two languages", options: ["Bigot", "Bohemian", "Bilingual", "Boer"], answer: "Bilingual" },
                    { q: "Twice a month", options: ["Biennial", "Bimonthly", "Bicentennial", "Bonus"], answer: "Bimonthly" },
                    { q: "Capable of being decomposed by biological agents", options: ["Biodegradable", "Biology", "Biopsy", "Botany"], answer: "Biodegradable" },
                    { q: "The story of a person's life written by somebody else", options: ["Biography", "Bibliography", "Ballad", "Bibliophile"], answer: "Biography" },
                    { q: "Study of living organisms", options: ["Biology", "Botany", "Biopsy", "Bonsai"], answer: "Biology" },
                    { q: "Removal of tissue for disease examination", options: ["Biopsy", "Biology", "Botany", "Biodiversity"], answer: "Biopsy" },
                    { q: "Very strange or unusual", options: ["Bombastic", "Bizarre", "Balderdash", "Bungle"], answer: "Bizarre" },
                    { q: "Words uttered impiously about God", options: ["Blasphemy", "Bombard", "Banter", "Breach"], answer: "Blasphemy" },
                    { q: "The sound made by a sheep", options: ["Bellow", "Buzz", "Bleat", "Bark"], answer: "Bleat" },
                    { q: "A person of South African Dutch descent", options: ["Boer", "Bohemian", "Bourgeois", "Brigand"], answer: "Boer" },
                    { q: "One who does not follow usual social rules", options: ["Bohemian", "Boer", "Bigot", "Bookworm"], answer: "Bohemian" },
                    { q: "Subject someone to continuous flow of questions", options: ["Bombard", "Bombastic", "Bungle", "Breach"], answer: "Bombard" },
                    { q: "Using high-sounding words with little meaning", options: ["Bombastic", "Balderdash", "Banter", "Bandying"], answer: "Bombastic" },
                    { q: "Huge fire for celebration", options: ["Bonfire", "Bouquet", "Boutique", "Beverage"], answer: "Bonfire" },
                    { q: "Dwarf varieties of trees grown in pots", options: ["Botanist", "Botany", "Bonsai", "Bark"], answer: "Bonsai" },
                    { q: "Money added to wages for performance", options: ["Bonus", "Budgeting", "Bullion", "Beneficiary"], answer: "Bonus" },
                    { q: "An avid book reader", options: ["Bookworm", "Botanist", "Bibliophile", "Bigot"], answer: "Bookworm" },
                    { q: "A hunting weapon which comes back", options: ["Boomerang", "Battery", "Buoy", "Bridle"], answer: "Boomerang" },
                    { q: "To take something on loan to return it", options: ["Borrow", "Bungle", "Breach", "Bask"], answer: "Borrow" },
                    { q: "Well-versed in plant knowledge", options: ["Botanist", "Boer", "Biopsy", "Biology"], answer: "Botanist" },
                    { q: "Scientific study of plants", options: ["Botany", "Biology", "Biopsy", "Bonsai"], answer: "Botany" },
                    { q: "Section of road where traffic gets slower", options: ["Bottleneck", "Boulevard", "Bureaucracy", "Boutique"], answer: "Bottleneck" },
                    { q: "A broad road bordered with trees", options: ["Boulevard", "Bottleneck", "Bouquet", "Bower"], answer: "Boulevard" },
                    { q: "An arrangement of flowers given as present", options: ["Bouquet", "Bonfire", "Boutique", "Bundle"], answer: "Bouquet" },
                    { q: "Belonging to middle class", options: ["Boer", "Bourgeois", "Brigand", "Brunette"], answer: "Bourgeois" },
                    { q: "A small shop that sells fashionable clothes", options: ["Boutique", "Brewery", "Bakery", "Bungalow"], answer: "Boutique" },
                    { q: "Affecting or relating to cows or cattle", options: ["Behemoth", "Botany", "Bovine", "Bark"], answer: "Bovine" },
                    { q: "A shady place under trees", options: ["Bower", "Byre", "Burrow", "Barracks"], answer: "Bower" },
                    { q: "Breaking or failing to observe a law", options: ["Breach", "Bungle", "Borrow", "Bombard"], answer: "Breach" },
                    { q: "A factory where beer is made", options: ["Brewery", "Bakery", "Boutique", "Byre"], answer: "Brewery" },
                    { q: "Leather straps to control a horse", options: ["Bridle", "Boomerang", "Bullion", "Battery"], answer: "Bridle" },
                    { q: "Member of a band of robbers", options: ["Burglar", "Brigand", "Bourgeois", "Bachelor"], answer: "Brigand" },
                    { q: "Hard but easily broken", options: ["Brittle", "Bundle", "Bullion", "Bale"], answer: "Brittle" },
                    { q: "The young of an animal cared for at one time", options: ["Bevy", "Brood", "Brunch", "Bundle"], answer: "Brood" },
                    { q: "Meal combining late breakfast and early lunch", options: ["Brunch", "Beverage", "Bouquet", "Bonfire"], answer: "Brunch" },
                    { q: "A woman with dark brown hair", options: ["Brunette", "Bourgeois", "Bohemian", "Beneficiary"], answer: "Brunette" },
                    { q: "Summary of estimated expenses", options: ["Budgeting", "Bureaucracy", "Bonus", "Bullion"], answer: "Budgeting" },
                    { q: "Gold and silver before manufacturing", options: ["Bullion", "Battery", "Boomerang", "Bridle"], answer: "Bullion" },
                    { q: "A collection of sticks", options: ["Bundle", "Bale", "Barrel", "Battery"], answer: "Bundle" },
                    { q: "A large single detached house", options: ["Bungalow", "Barracks", "Boutique", "Byre"], answer: "Bungalow" },
                    { q: "Carry out a task clumsily", options: ["Bungle", "Breach", "Borrow", "Bask"], answer: "Bungle" },
                    { q: "Floating container anchored to sea bottom", options: ["Buoy", "Barometer", "Battery", "Boomerang"], answer: "Buoy" },
                    { q: "Government run by officials", options: ["Bureaucracy", "Budgeting", "Bottleneck", "Boulevard"], answer: "Bureaucracy" },
                    { q: "Enters building illegally to steal", options: ["Burglar", "Brigand", "Bourgeois", "Boer"], answer: "Burglar" },
                    { q: "Hole excavated by animal as dwelling", options: ["Burrow", "Bower", "Byre", "Bakery"], answer: "Burrow" },
                    { q: "The sound made by bees", options: ["Buzz", "Bellow", "Bleat", "Banter"], answer: "Buzz" },
                    { q: "Place where cows are sheltered", options: ["Byre", "Brewery", "Barracks", "Bakery"], answer: "Byre" }
                ]
            }
        };

        function App() {
            const [gameState, setGameState] = useState('START'); 
            const [activeSet, setActiveSet] = useState('set1');
            const [index, setIndex] = useState(0);
            const [userAnswers, setUserAnswers] = useState([]);

            const quizData = quizSets[activeSet].data;
            const currentQuestion = quizData[index];
            const hasAnswered = userAnswers[index] !== undefined && userAnswers[index] !== null;
            const progress = ((index + 1) / quizData.length) * 100;

            const startQuiz = (setKey) => {
                setActiveSet(setKey);
                setIndex(0);
                setUserAnswers(new Array(quizSets[setKey].data.length).fill(null));
                setGameState('QUIZ');
            };

            const selectAnswer = (answer) => {
                if (hasAnswered) return;
                const newAnswers = [...userAnswers];
                newAnswers[index] = answer;
                setUserAnswers(newAnswers);
            };

            if (gameState === 'START') {
                return (
                    <div className="quiz-container">
                        <div className="w-full max-w-md backdrop-blur-xl bg-white/5 border border-white/10 rounded-3xl p-8 text-center shadow-2xl animate-fade-in">
                            <div className="text-5xl mb-4">📖</div>
                            <h1 className="text-3xl font-bold mb-6">Vocabulary Master</h1>
                            <div className="space-y-4">
                                {Object.keys(quizSets).map(key => (
                                    <button key={key} onClick={() => startQuiz(key)} className="w-full p-4 rounded-2xl bg-white/5 border border-white/10 hover:bg-white/10 flex items-center justify-between group transition-all">
                                        <div className="text-left">
                                            <div className="font-bold text-white">{quizSets[key].title}</div>
                                            <div className="text-xs text-slate-400">{quizSets[key].data.length} Questions</div>
                                        </div>
                                        <span className="text-cyan-400 group-hover:translate-x-1 transition-transform">→</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }

            if (gameState === 'PAUSED') {
                return (
                    <div className="quiz-container">
                        <div className="w-full max-w-md backdrop-blur-xl bg-white/10 border border-white/20 rounded-3xl p-10 text-center shadow-2xl animate-fade-in">
                            <div className="text-5xl mb-6">⏸️</div>
                            <h2 className="text-3xl font-bold mb-2">Quiz Paused</h2>
                            <p className="text-slate-400 mb-8">Progress: {index + 1} / {quizData.length}</p>
                            <button onClick={() => setGameState('QUIZ')} className="w-full py-4 mb-4 rounded-xl bg-cyan-500 font-bold text-white shadow-lg hover:bg-cyan-400 transition-all">Resume Quiz</button>
                            <button onClick={() => setGameState('START')} className="w-full py-3 rounded-xl bg-white/5 text-slate-300 hover:bg-white/10 transition-all">Quit to Menu</button>
                        </div>
                    </div>
                );
            }

            if (gameState === 'RESULT') {
                const correct = userAnswers.filter((ans, i) => ans === quizData[i]?.answer).length;
                return (
                    <div className="quiz-container">
                        <div className="w-full max-w-xl bg-white/5 border border-white/10 rounded-3xl p-8 shadow-2xl animate-fade-in text-center">
                            <div className="text-6xl mb-4">🏆</div>
                            <h2 className="text-4xl font-bold mb-2">Complete!</h2>
                            <div className="text-2xl text-cyan-400 font-bold mb-8">{correct} / {quizData.length} Score</div>
                            <button onClick={() => setGameState('START')} className="w-full py-4 rounded-xl bg-white text-slate-900 font-bold">Try Another Set</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="quiz-container">
                    <div className="w-full max-w-2xl bg-white/5 border border-white/10 rounded-3xl p-8 shadow-2xl animate-fade-in">
                        <div className="mb-6 flex items-center gap-4">
                            <button onClick={() => setGameState('PAUSED')} className="p-2 hover:bg-white/10 rounded-lg text-slate-400">⏸️</button>
                            <div className="flex-1">
                                <div className="flex justify-between text-[10px] text-slate-400 mb-1 font-bold uppercase">
                                    <span>{quizSets[activeSet].title}</span>
                                    <span>{index + 1} of {quizData.length}</span>
                                </div>
                                <div className="w-full h-1 bg-white/5 rounded-full">
                                    <div className="h-full bg-cyan-500 transition-all duration-300" style={{ width: `${progress}%` }}></div>
                                </div>
                            </div>
                        </div>

                        <h2 className="text-xl md:text-2xl font-bold mb-8 leading-tight">{currentQuestion?.q}</h2>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-10">
                            {currentQuestion?.options.map((option, i) => {
                                const isUserChoice = userAnswers[index] === option;
                                const isCorrect = option === currentQuestion.answer;
                                let btnStyle = "bg-white/5 border-white/10 text-slate-300 hover:bg-white/10";
                                if (hasAnswered) {
                                    if (isCorrect) btnStyle = "bg-emerald-500/20 border-emerald-500 text-emerald-300";
                                    else if (isUserChoice) btnStyle = "bg-red-500/20 border-red-500 text-red-300 animate-shake";
                                    else btnStyle = "opacity-20 border-transparent text-slate-500";
                                }
                                return (
                                    <button key={i} disabled={hasAnswered} onClick={() => selectAnswer(option)} className={`p-4 rounded-xl text-left border-2 flex justify-between items-center transition-all ${btnStyle}`}>
                                        <span className="text-sm md:text-base font-medium">{option}</span>
                                        {hasAnswered && isCorrect && <span className="text-emerald-400">✓</span>}
                                        {hasAnswered && isUserChoice && !isCorrect && <span className="text-red-400">✗</span>}
                                    </button>
                                );
                            })}
                        </div>

                        <div className="flex gap-4">
                            <button onClick={() => setIndex(prev => Math.max(0, prev - 1))} disabled={index === 0} className="px-6 py-3 rounded-xl border border-white/10 bg-white/5 disabled:opacity-20">←</button>
                            {index === quizData.length - 1 ? (
                                <button onClick={() => setGameState('RESULT')} disabled={!hasAnswered} className="flex-1 py-3 rounded-xl bg-cyan-500 font-bold disabled:opacity-50">Finish</button>
                            ) : (
                                <button onClick={() => setIndex(prev => prev + 1)} disabled={!hasAnswered} className="flex-1 py-3 rounded-xl bg-white/10 font-bold disabled:opacity-50">Next Question →</button>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
