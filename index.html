                                ))}
                            </div>
                            <div className="mt-10 pt-6 border-t border-white/5 text-[10px] text-slate-500 font-bold uppercase tracking-[0.2em]">
                                Warning: Once you click an answer, it is locked!
                            </div>
                        </div>
                    </div>
                );
            }

            const currentSet = quizData[activeSet];
            const currentQ = currentSet.questions[index];
            const currentAnswerKey = `${activeSet}-${index}`;
            const selectedOption = answers[currentAnswerKey];
            const hasAnswered = selectedOption !== undefined;

            return (
                <div className="quiz-bg flex items-center justify-center p-4">
                    <div className="w-full max-w-2xl bg-[#11111d]/95 border border-white/10 rounded-[40px] p-8 md:p-12 shadow-2xl animate-fade-in">
                        <div className="flex items-center gap-6 mb-12">
                            <button onClick={() => setGameState('MENU')} className="p-4 bg-white/5 hover:bg-white/10 rounded-2xl transition-all active:scale-90">🏠</button>
                            <div className="flex-1">
                                <div className="flex justify-between text-[10px] font-black text-slate-500 mb-2 uppercase tracking-widest">
                                    <span>{currentSet.title}</span>
                                    <span>{index + 1} / {currentSet.questions.length}</span>
                                </div>
                                <div className="h-2 bg-white/5 rounded-full overflow-hidden">
                                    <div className="h-full bg-gradient-to-r from-indigo-500 to-cyan-400 shadow-[0_0_15px_rgba(99,102,241,0.5)] transition-all duration-700 ease-out" style={{width: `${((index+1)/currentSet.questions.length)*100}%`}}></div>
                                </div>
                            </div>
                        </div>

                        <div className="min-h-[140px] flex items-center mb-10">
                            <h2 className="text-2xl md:text-3xl font-bold leading-tight text-white/95">{currentQ.q}</h2>
                        </div>

                        <div className="grid grid-cols-1 gap-4 mb-12">
                            {currentQ.options.map((opt, i) => {
                                const isCorrect = opt === currentQ.answer;
                                const isSelected = selectedOption === opt;
                                let style = "bg-white/5 border-white/5 text-slate-300 hover:bg-white/10 hover:border-white/20";
                                
                                if (hasAnswered) {
                                    if (isCorrect) style = "bg-emerald-500/20 border-emerald-500 text-emerald-400 shadow-[0_0_20px_rgba(16,185,129,0.1)]";
                                    else if (isSelected) style = "bg-red-500/20 border-red-500 text-red-400 animate-shake";
                                    else style = "opacity-20 border-transparent grayscale text-slate-600";
                                }

                                return (
                                    <button 
                                        key={i} 
                                        disabled={hasAnswered} 
                                        onClick={() => setAnswers({...answers, [currentAnswerKey]: opt})}
                                        className={`w-full p-6 rounded-3xl border-2 text-left transition-all duration-300 text-lg font-bold ${style}`}
                                    >
                                        <div className="flex justify-between items-center">
                                            <span>{opt}</span>
                                            {hasAnswered && isCorrect && <span className="text-emerald-500">✓</span>}
                                            {hasAnswered && isSelected && !isCorrect && <span className="text-red-500">✕</span>}
                                        </div>
                                    </button>
                                );
                            })}
                        </div>

                        <div className="flex gap-4">
                            <button 
                                onClick={() => setIndex(i => Math.max(0, i-1))} 
                                disabled={index === 0} 
                                className="px-10 py-5 bg-white/5 rounded-[24px] disabled:opacity-5 transition-all hover:bg-white/10 font-bold"
                            >←</button>
                            <button 
                                onClick={() => {
                                    if (index < currentSet.questions.length - 1) setIndex(i => i + 1);
                                    else setGameState('MENU');
                                }} 
                                disabled={!hasAnswered} 
                                className="flex-1 py-5 bg-indigo-600 hover:bg-indigo-500 rounded-[24px] font-black text-lg shadow-2xl shadow-indigo-500/30 disabled:opacity-40 transition-all active:scale-[0.98]"
                            >
                                {index === currentSet.questions.length - 1 ? 'Complete Series' : 'Next Question →'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
