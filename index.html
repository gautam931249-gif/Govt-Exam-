<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Word Substitution Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        .animate-scale-in { animation: scaleIn 0.3s ease-out forwards; }
        .animate-shake { animation: shake 0.2s ease-in-out 0s 2; }
        .animate-pulse-slow { animation: pulse 6s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Mocking Lucide icons since we are using the CDN version
        const Icon = ({ name, className }) => {
            useEffect(() => {
                lucide.createIcons();
            }, []);
            return <i data-lucide={name} className={className}></i>;
        };

        const quizData = [
            { q: "A person who loves books", options: ["Philanthropist", "Bibliophile", "Optimist", "Linguist"], answer: "Bibliophile" },
            { q: "A person who hates mankind", options: ["Misanthropist", "Philanthropist", "Optimist", "Realist"], answer: "Misanthropist" },
            { q: "A person who travels from place to place", options: ["Nomad", "Citizen", "Native", "Farmer"], answer: "Nomad" },
            { q: "A person who writes dictionaries", options: ["Lexicographer", "Biographer", "Editor", "Poet"], answer: "Lexicographer" }
        ];

        function App() {
            const [index, setIndex] = useState(0);
            const [userAnswers, setUserAnswers] = useState(new Array(quizData.length).fill(null));
            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [showResults, setShowResults] = useState(false);

            const currentQuestion = quizData[index];
            const progress = ((index + 1) / quizData.length) * 100;

            const selectAnswer = (answer) => {
                setSelectedAnswer(answer);
                const newAnswers = [...userAnswers];
                newAnswers[index] = answer;
                setUserAnswers(newAnswers);
            };

            const nextQuestion = () => {
                if (index < quizData.length - 1) {
                    setIndex(index + 1);
                    setSelectedAnswer(userAnswers[index + 1]);
                }
            };

            const prevQuestion = () => {
                if (index > 0) {
                    setIndex(index - 1);
                    setSelectedAnswer(userAnswers[index - 1]);
                }
            };

            const finishQuiz = () => setShowResults(true);
            const restartQuiz = () => {
                setIndex(0);
                setUserAnswers(new Array(quizData.length).fill(null));
                setSelectedAnswer(null);
                setShowResults(false);
            };

            const calculateResults = () => {
                let correct = 0;
                quizData.forEach((q, i) => { if (userAnswers[i] === q.answer) correct++; });
                return { correct, wrong: quizData.length - correct };
            };

            if (showResults) {
                const { correct, wrong } = calculateResults();
                const percentage = Math.round((correct / quizData.length) * 100);

                return (
                    <div className="min-h-screen bg-slate-950 flex items-center justify-center p-4">
                        <div className="relative w-full max-w-2xl backdrop-blur-xl bg-white/5 border border-white/10 rounded-3xl p-8 shadow-2xl animate-fade-in text-white">
                            <div className="flex justify-center mb-6">
                                <div className="w-20 h-20 rounded-full bg-gradient-to-br from-cyan-400 to-purple-500 flex items-center justify-center animate-scale-in">
                                    <Icon name="trophy" className="w-10 h-10 text-white" />
                                </div>
                            </div>
                            <h2 className="text-4xl font-bold text-center mb-2 bg-gradient-to-r from-cyan-400 to-purple-400 bg-clip-text text-transparent">Quiz Complete!</h2>
                            <div className="grid grid-cols-3 gap-4 mb-8 mt-8">
                                <div className="bg-white/5 border border-white/10 rounded-2xl p-4 text-center">
                                    <div className="text-2xl font-bold text-cyan-400">{quizData.length}</div>
                                    <div className="text-xs text-slate-400 uppercase">Total</div>
                                </div>
                                <div className="bg-white/5 border border-emerald-500/20 rounded-2xl p-4 text-center">
                                    <div className="text-2xl font-bold text-emerald-400">{correct}</div>
                                    <div className="text-xs text-slate-400 uppercase">Correct</div>
                                </div>
                                <div className="bg-white/5 border border-red-500/20 rounded-2xl p-4 text-center">
                                    <div className="text-2xl font-bold text-red-400">{wrong}</div>
                                    <div className="text-xs text-slate-400 uppercase">Wrong</div>
                                </div>
                            </div>
                            <button onClick={restartQuiz} className="w-full py-4 rounded-xl bg-gradient-to-r from-cyan-500 to-purple-500 font-semibold hover:opacity-90 transition-all transform hover:scale-105">
                                Start New Quiz
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-950 flex items-center justify-center p-4 relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-full h-full bg-[radial-gradient(circle_at_50%_50%,rgba(56,189,248,0.1),transparent_50%)]"></div>
                    <div className="relative w-full max-w-2xl backdrop-blur-xl bg-white/5 border border-white/10 rounded-3xl p-8 shadow-2xl animate-fade-in text-white">
                        <div className="flex items-center justify-between mb-6">
                            <div className="flex items-center gap-3">
                                <div className="w-12 h-12 rounded-xl bg-gradient-to-br from-cyan-400 to-purple-500 flex items-center justify-center">
                                    <Icon name="book-open" className="w-6 h-6 text-white" />
                                </div>
                                <div>
                                    <h1 className="text-2xl font-bold bg-gradient-to-r from-cyan-400 to-purple-400 bg-clip-text text-transparent">Vocabulary Quiz</h1>
                                </div>
                            </div>
                        </div>

                        <div className="mb-6">
                            <div className="flex justify-between text-xs text-slate-400 mb-2">
                                <span>Question {index + 1} of {quizData.length}</span>
                                <span>{Math.round(progress)}%</span>
                            </div>
                            <div className="w-full h-2 bg-white/10 rounded-full overflow-hidden">
                                <div className="h-full bg-gradient-to-r from-cyan-400 to-purple-500 transition-all duration-500" style={{ width: `${progress}%` }}></div>
                            </div>
                        </div>

                        <h2 className="text-2xl font-semibold mb-6">{currentQuestion.q}</h2>

                        <div className="space-y-3 mb-8">
                            {currentQuestion.options.map((option, i) => {
                                const isSelected = selectedAnswer === option;
                                const isCorrect = option === currentQuestion.answer;
                                const showCorrect = selectedAnswer !== null && isCorrect;
                                const showWrong = isSelected && !isCorrect && selectedAnswer !== null;

                                return (
                                    <button
                                        key={i}
                                        onClick={() => selectAnswer(option)}
                                        className={`w-full p-4 rounded-xl text-left transition-all border ${
                                            showCorrect ? 'bg-emerald-500/20 border-emerald-500 text-emerald-300' :
                                            showWrong ? 'bg-red-500/20 border-red-500 text-red-300 animate-shake' :
                                            isSelected ? 'bg-cyan-500/20 border-cyan-500 text-white' :
                                            'bg-white/5 border-white/10 text-slate-300 hover:bg-white/10'
                                        }`}
                                    >
                                        <div className="flex justify-between items-center">
                                            {option}
                                            {showCorrect && <span>✓</span>}
                                            {showWrong && <span>✗</span>}
                                        </div>
                                    </button>
                                );
                            })}
                        </div>

                        <div className="flex gap-3">
                            <button onClick={prevQuestion} disabled={index === 0} className="flex-1 py-3 rounded-xl bg-white/5 border border-white/10 disabled:opacity-30">Previous</button>
                            {index === quizData.length - 1 ? (
                                <button onClick={finishQuiz} className="flex-1 py-3 rounded-xl bg-gradient-to-r from-cyan-500 to-purple-500 font-semibold">Finish</button>
                            ) : (
                                <button onClick={nextQuestion} className="flex-1 py-3 rounded-xl bg-gradient-to-r from-cyan-500 to-purple-500 font-semibold">Next</button>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
